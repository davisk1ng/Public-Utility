// This is a white version of the chain icon for profile page use. Replace with your own white chain SVG for best results.
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <g filter="url(#shadow)">
    <rect x="7" y="2" width="10" height="20" rx="5" fill="#fff" stroke="#fff" stroke-width="2"/>
    <rect x="2" y="7" width="20" height="10" rx="5" fill="#fff" stroke="#fff" stroke-width="2"/>
  </g>
  <defs>
    <filter id="shadow" x="0" y="0" width="24" height="24" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
    </filter>
  </defs>
</svg>
