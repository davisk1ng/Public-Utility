<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Hyperlink
    </title>
    <link rel="icon" type="image/png" href="assets/App logo.png">
    <link rel="apple-touch-icon" href="assets/App logo.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://use.typekit.net/csj6fho.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div id="splashScreen" aria-label="Loading screen">
        <img id="splashIcon" src="assets/Chain Icon.png" alt="Loading">
    </div>

    <button id="settingsBtn" aria-label="Settings">
        <img id="settingsBtnIcon" src="assets/Gear Icon.png" alt="Settings">
    </button>

    <!-- Settings Screen -->
    <div id="settingsOverlay" class="overlay hidden"></div>
    <div id="settingsScreen" class="hidden">
        <div id="settingsHeader">
            <span id="settingsTitle">Settings</span>
            <hr id="settingsDivider">
        </div>
        <div id="settingsBody">
            <button id="resetChainBtn">Reset Chain Length</button>
            <button id="hideUiBtn" aria-pressed="false">Hide UI: Off</button>
        </div>
    </div>

    <div id="uiControls">
        <button id="addEcho" aria-label="Add Echo">
            <img id="addEchoIcon" src="assets/Chain Icon.png" alt="Add Echo">
        </button>
        <div id="zoomControl">
            <div id="zoomLabel">Zoom</div>
            <div id="zoomRow">
                <span class="zoomSign">+</span>
                <input id="zoomSlider" type="range" min="0" max="100" value="0" aria-label="Zoom slider">
                <span class="zoomSign">-</span>
            </div>
        </div>
    </div>
    <button id="removeTagBtn" class="hidden" aria-label="Remove selected dog tag">Remove Tag</button>
    <div id="statusMessage">Loading chain model...</div>

    <!-- Dog Tag Modal -->
    <div id="echoModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-field">
                <label for="titleInput">How did you self improve?</label>
                <div class="input-with-count">
                    <input type="text" id="titleInput" placeholder="Enter title" maxlength="40">
                    <span id="titleCharCount" aria-live="polite">0/40</span>
                </div>
            </div>
            <div class="modal-buttons">
                <button id="confirmEcho">Add link</button>
                <button id="cancelEcho">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Dog Tag Preview -->
    <div id="heroPreviewOverlay" class="overlay hidden"></div>
    <div id="heroPreviewStage" class="hero-preview-stage hidden">
        <canvas id="heroPreviewCanvas" aria-label="Dog tag preview"></canvas>
        <button id="closeHeroPreview" class="close-button hero-preview-close">Back</button>
    </div>

    <canvas id="chainCanvas"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.152.2/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="js/script.js"></script>

</body>
</html>
